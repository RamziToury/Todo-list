<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo List</title>
  <link rel="stylesheet" href="page.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ========== PAGE AUTH ========== -->
  <div id="auth-page" class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Connexion</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Inscription</button>
      </div>

      <div id="form-login" class="auth-form">
        <div class="field-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="exemple@mail.com" autocomplete="email"/>
        </div>
        <div class="field-group">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <p class="msg-error" id="login-error"></p>
        <button class="btn-submit" onclick="handleLogin()">Se connecter</button>
      </div>

      <div id="form-register" class="auth-form hidden">
        <div class="field-group">
          <label for="reg-name">Nom</label>
          <input type="text" id="reg-name" placeholder="Votre nom" autocomplete="name"/>
        </div>
        <div class="field-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="exemple@mail.com" autocomplete="email"/>
        </div>
        <div class="field-group">
          <label for="reg-password">Mot de passe</label>
          <input type="password" id="reg-password" placeholder="6 caractères minimum" autocomplete="new-password"/>
        </div>
        <p class="msg-error" id="reg-error"></p>
        <p class="msg-ok" id="reg-success"></p>
        <button class="btn-submit" onclick="handleRegister()">S'inscrire</button>
      </div>

    </div>
  </div>

  <!-- ========== APP ========== -->
  <div id="app-page" class="hidden">

    <header class="topbar">
      <span class="topbar-user" id="welcome-msg"></span>
      <div class="topbar-actions">
        <button class="btn-flat" id="dark-toggle" onclick="toggleDarkMode()">Mode sombre</button>
        <button class="btn-flat danger" onclick="handleLogout()">Deconnexion</button>
      </div>
    </header>

    <main class="app-main">

      <div class="history-bar hidden" id="history-bar">
        <span id="hist-added"></span>
        <span id="hist-deleted"></span>
      </div>

      <section class="panel">
        <h2 class="panel-title">Nouvelle tâche</h2>
        <div class="task-form">
          <div class="form-row">
            <div class="field-group">
              <label for="task-title">Titre</label>
              <input type="text" id="task-title" placeholder="Titre de la tâche"/>
            </div>
            <div class="field-group field-date">
              <label for="task-date">Date</label>
              <input type="date" id="task-date"/>
            </div>
          </div>
          <div class="field-group">
            <label for="task-desc">Description</label>
            <textarea id="task-desc" placeholder="Description (optionnelle)" rows="2"></textarea>
          </div>
          <p class="msg-error" id="task-error"></p>
          <button class="btn-submit" onclick="handleAddTask()">Ajouter</button>
        </div>
      </section>

      <section class="panel panel-filters">
        <input type="text" id="search-input" class="search-input" placeholder="Rechercher par titre, mot-cle ou statut..." oninput="renderTasks()"/>
        <div class="filter-btns">
          <button class="filter-btn active" onclick="setFilter('all', this)">Toutes</button>
          <button class="filter-btn" onclick="setFilter('todo', this)">A faire</button>
          <button class="filter-btn" onclick="setFilter('done', this)">Terminees</button>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel-title">Mes tâches <span id="task-count" class="count-badge"></span></h2>
        <div id="task-list"></div>
        <p id="empty-msg" class="empty-msg hidden">Aucune tâche.</p>
      </section>

    </main>
  </div>

  <!-- Modal édition -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3 class="modal-title">Modifier la tâche</h3>
      <div class="field-group">
        <label>Titre</label>
        <input type="text" id="edit-title"/>
      </div>
      <div class="field-group">
        <label>Description</label>
        <textarea id="edit-desc" rows="3"></textarea>
      </div>
      <div class="field-group">
        <label>Date</label>
        <input type="date" id="edit-date"/>
      </div>
      <div class="modal-actions">
        <button class="btn-flat" onclick="closeModal()">Annuler</button>
        <button class="btn-submit small" onclick="saveEdit()">Enregistrer</button>
      </div>
    </div>
  </div>

  <script src="page.js"></script>
</body>
</html>
